version: 2

multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: "weekly"
      day: "saturday"

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "dependencies"
