name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Gradle checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v6
        with:
          path: olcbox

      - name: Checkout olcrtc
        uses: actions/checkout@v6
        with:
          repository: openlibrecommunity/olcrtc
          ref: master
          path: olcrtc
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run checks
        working-directory: olcbox
        run: |
          export OLCRTC_REPO="${{ github.workspace }}/olcrtc"
          ./gradlew :sharedUI:jvmTest :desktopApp:compileKotlin :androidApp:assembleDebug --stacktrace
