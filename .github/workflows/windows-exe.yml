name: Build Turnbox Releases

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v4
        with:
          path: olcbox

      - name: Checkout olcrtc
        uses: actions/checkout@v4
        with:
          repository: openlibrecommunity/olcrtc
          ref: master
          path: olcrtc
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          architecture: x64

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: olcrtc/go.sum

      - name: Build Windows EXE
        shell: pwsh
        working-directory: olcbox
        run: |
          $env:OLCRTC_REPO="${{ github.workspace }}\olcrtc"
          .\gradlew.bat :desktopApp:packageReleaseExe --stacktrace

      - name: Prepare asset
        shell: pwsh
        working-directory: olcbox
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $exe = Get-ChildItem "desktopApp/build/compose/binaries/main-release/exe/*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "dist/Turnbox-windows-amd64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Turnbox-windows-amd64-exe
          path: olcbox/dist/Turnbox-windows-amd64.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v4
        with:
          path: olcbox

      - name: Checkout olcrtc
        uses: actions/checkout@v4
        with:
          repository: openlibrecommunity/olcrtc
          ref: master
          path: olcrtc
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: olcrtc/go.sum

      - name: Build macOS DMG
        working-directory: olcbox
        run: |
          export OLCRTC_REPO="${{ github.workspace }}/olcrtc"
          ./gradlew :desktopApp:packageReleaseDmg --stacktrace

      - name: Prepare asset
        working-directory: olcbox
        run: |
          mkdir -p dist
          cp desktopApp/build/compose/binaries/main-release/dmg/*.dmg dist/Turnbox-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Turnbox-macos-dmg
          path: olcbox/dist/Turnbox-macos.dmg

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v4
        with:
          path: olcbox

      - name: Checkout olcrtc
        uses: actions/checkout@v4
        with:
          repository: openlibrecommunity/olcrtc
          ref: master
          path: olcrtc
          submodules: recursive

      - name: Install Linux packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: olcrtc/go.sum

      - name: Build Linux DEB
        working-directory: olcbox
        run: |
          export OLCRTC_REPO="${{ github.workspace }}/olcrtc"
          ./gradlew :desktopApp:packageReleaseDeb --stacktrace

      - name: Prepare asset
        working-directory: olcbox
        run: |
          mkdir -p dist
          cp desktopApp/build/compose/binaries/main-release/deb/*.deb dist/Turnbox-linux-amd64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Turnbox-linux-amd64-deb
          path: olcbox/dist/Turnbox-linux-amd64.deb

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ANDROID_NDK_VERSION: "28.2.13676358"
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v4
        with:
          path: olcbox

      - name: Checkout olcrtc
        uses: actions/checkout@v4
        with:
          repository: openlibrecommunity/olcrtc
          ref: master
          path: olcrtc
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: olcrtc/go.sum

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;${ANDROID_NDK_VERSION}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Go mobile tooling
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install github.com/magefile/mage@latest

      - name: Initialize gomobile
        working-directory: olcrtc
        run: |
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          gomobile init

      - name: Configure Android release signing
        working-directory: olcbox
        run: |
          if [ -n "${ANDROID_RELEASE_KEYSTORE_BASE64}" ] &&
             [ -n "${ANDROID_RELEASE_STORE_PASSWORD}" ] &&
             [ -n "${ANDROID_RELEASE_KEY_ALIAS}" ] &&
             [ -n "${ANDROID_RELEASE_KEY_PASSWORD}" ]; then
            printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | tr -d '\r\n' | base64 --decode > release-keystore.jks
            cat > keystore.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=${ANDROID_RELEASE_STORE_PASSWORD}
          keyAlias=${ANDROID_RELEASE_KEY_ALIAS}
          keyPassword=${ANDROID_RELEASE_KEY_PASSWORD}
          EOF
          else
            echo "Android production APK requires signing secrets:"
            echo "ANDROID_RELEASE_KEYSTORE_BASE64, ANDROID_RELEASE_STORE_PASSWORD, ANDROID_RELEASE_KEY_ALIAS, ANDROID_RELEASE_KEY_PASSWORD"
            exit 1
          fi

      - name: Build production APK
        working-directory: olcbox
        run: |
          export OLCRTC_REPO="${{ github.workspace }}/olcrtc"
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          ./gradlew :sharedUI:jvmTest :androidApp:assembleRelease --stacktrace

      - name: Prepare Android release assets
        working-directory: olcbox
        run: |
          mkdir -p dist
          cp androidApp/build/outputs/apk/release/*.apk dist/Turnbox-android-release.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Turnbox-android-apk
          path: olcbox/dist/Turnbox-android-release.apk

  publish-nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build-windows
      - build-macos
      - build-linux
      - build-android

    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish public GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t assets < <(find dist -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi
          release_notes="Latest desktop and Android builds from main at ${GITHUB_SHA}."

          if gh release view nightly >/dev/null 2>&1; then
            mapfile -t existing_asset_ids < <(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/nightly" --jq '.assets[].id')
            for asset_id in "${existing_asset_ids[@]}"; do
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >/dev/null
            done

            gh release edit nightly \
              --title "Nightly Turnbox builds" \
              --notes "$release_notes" \
              --prerelease
            gh release upload nightly "${assets[@]}" --clobber
          else
            gh release create nightly "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "Nightly Turnbox builds" \
              --notes "$release_notes" \
              --prerelease
          fi
